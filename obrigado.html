<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demanda Registrada — Gabinete Prof. Pablo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 24px;
            padding: 52px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,.10);
            animation: up .4s ease;
        }
        @keyframes up {
            from { transform: translateY(24px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .ico {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #059669);
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            margin: 0 auto 24px;
        }
        h1 { font-size: 24px; font-weight: 800; color: #1a202c; margin-bottom: 12px; }
        p  { font-size: 15px; color: #64748b; line-height: 1.65; margin-bottom: 32px; }
        a {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #0a2463, #1e3a8a);
            color: #fff;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: opacity .18s;
        }
        a:hover { opacity: .88; }
    </style>
</head>
<body>
    <div class="card">
        <div class="ico">✅</div>
        <h1>Demanda Registrada!</h1>
        <p>Sua demanda foi registrada com sucesso. A equipe do <strong>Prof. Pablo</strong> irá analisar e entrar em contato em breve.<br><br>Obrigado por contribuir com Guarapuava!</p>
        <a href="https://gabineteprofpablo.netlify.app/">Registrar outra demanda</a>
    </div>
</body>
</html>
